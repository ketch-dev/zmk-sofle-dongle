# go to sleep after two hours (2*60*60*1000ms)

CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

CONFIG_ZMK_SLEEP=y

#CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

#EC11 enable
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB underglow disabled
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_RGB_UNDERGLOW=n

# MOUSE / POINTING disabled
CONFIG_ZMK_MOUSE=n
CONFIG_ZMK_POINTING=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# === Display ===
CONFIG_ZMK_DISPLAY=y

# --- Dongle Display Widgets ---
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=n
CONFIG_ZMK_DONGLE_DISPLAY_MODIFIERS=n
CONFIG_ZMK_DONGLE_DISPLAY_LAYER=n
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=n
CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=n
CONFIG_ZMK_DONGLE_DISPLAY_WPM=n
CONFIG_ZMK_HID_INDICATORS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- Dongle Display Parameters ---
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="left"
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_NAME_SCROLL_WIDTH=50

# soft off disabled
CONFIG_ZMK_PM_SOFT_OFF=n
